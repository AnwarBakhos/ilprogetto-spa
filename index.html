    <meta name="theme-color" content="#1c1c1c" />
    <meta name="robots" content="index, follow" />

    <!-- Fallback title/description — TanStack Router overrides these per-route -->

    />

    <meta property="og:site_name" content="iL Progetto LLC" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap"
      rel="stylesheet"
    />

    <!-- Global styles injected by Vite/Tailwind -->
    <link rel="stylesheet" href="/styles.css" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
